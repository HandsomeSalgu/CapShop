name: CI/CD Deploy Pipeline

# 언제 이 스크립트가 실행될지 정의합니다. (main 브랜치에 코드가 push 되었을 때)
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    # 어디서 실행할지 지정합니다. (GitHub 서버가 아닌, 사용자님의 '데스크톱'에서 실행하라는 뜻)
    runs-on: self-hosted

    steps:
    # 0. Git dubious ownership 에러 우회 (runner가 NETWORK SERVICE 계정으로 실행될 때 소유권 불일치 방지)
    - name: 0. Fix git safe.directory
      run: git config --global --add safe.directory '*'

    # 1. 저장소에서 최신 코드를 데스크톱으로 다운로드 받습니다.
    - name: 1. Checkout Repository
      uses: actions/checkout@v4

    # 1.5 깃허브 Secrets에서 값을 환경 변수로 받아 각 폴더에 .env 파일을 즉석으로 생성합니다.
    - name: 1.5 Create .env files from GitHub Secrets
      env:
        BACKEND_ENV: ${{ secrets.BACKEND_ENV_FILE }}
        AI_SERVER_ENV: ${{ secrets.AI_SERVER_ENV_FILE }}
        FRONTEND_ENV: ${{ secrets.FRONTEND_ENV_FILE }}
      run: |
        $Utf8NoBom = New-Object System.Text.UTF8Encoding $False
        [System.IO.File]::WriteAllText("backend/.env", $env:BACKEND_ENV.Replace("`r`n", "`n"), $Utf8NoBom)
        [System.IO.File]::WriteAllText("ai-server/.env", $env:AI_SERVER_ENV.Replace("`r`n", "`n"), $Utf8NoBom)
        [System.IO.File]::WriteAllText("frontend/web/.env", $env:FRONTEND_ENV.Replace("`r`n", "`n"), $Utf8NoBom)

    # 2. 다운받은 코드 중 backend 폴더로 들어가서 Maven을 이용해 빌드합니다. (jar 파일 생성)
    - name: 2. Build with Maven
      working-directory: ./backend
      # Windows PowerShell 환경에서 파라미터 인식 오류를 막기 위해 다시 -DskipTests로 복구합니다. (테스트 코드는 앞서 고쳤으므로 컴파일을 통과합니다!)
      run: ./mvnw.cmd clean package -DskipTests
      
    # 2.5 Nginx가 처음 실행될 때 SSL 인증서가 없으면 에러가 발생하므로, 포트 점유 없이 임시 인증서를 먼저 생성합니다.
    - name: 2.5 Init Dummy SSL Certificate
      run: |
        if (-not (Test-Path "certbot/conf/live/capshop.cloud/fullchain.pem")) {
          Write-Host "SSL 인증서가 없습니다. Nginx 실행을 위해 Dummy 인증서를 생성합니다."
          New-Item -ItemType Directory -Force -Path "certbot/conf/live/capshop.cloud"
          docker run --rm -v "${PWD}/certbot/conf:/etc/letsencrypt" alpine/openssl req -x509 -nodes -days 1 -newkey rsa:2048 -keyout /etc/letsencrypt/live/capshop.cloud/privkey.pem -out /etc/letsencrypt/live/capshop.cloud/fullchain.pem -subj "/CN=capshop.cloud"
          Set-Content -Path "certbot/conf/live/capshop.cloud/dummy.txt" -Value "dummy"
        } else {
          Write-Host "SSL 인증서가 이미 존재합니다."
        }

    # 3. 도커 컴포즈를 사용하여 전체 컨테이너(프론트, 백, AI, DB)를 빌드하고 백그라운드에서 실행합니다.
    - name: 3. Deploy via Docker Compose (Sequential Build)
      run: |
        docker compose build backend
        docker compose build frontend
        docker compose build ai-server
        docker compose up -d

    # 4. Dummy 인증서가 감지되면, Nginx(포트 80)를 띄워둔 상태에서 Webroot 방식으로 실제 인증서를 발급받습니다.
    - name: 4. Issue Real Let's Encrypt Certificate
      run: |
        if (Test-Path "certbot/conf/live/capshop.cloud/dummy.txt") {
           Write-Host "Dummy 인증서 감지. 실제 인증서 발급을 시작합니다."
           Remove-Item -Recurse -Force "certbot/conf/live/capshop.cloud"
           
           docker compose run --rm --entrypoint "" certbot certbot certonly --webroot -w /var/www/certbot -d capshop.cloud --non-interactive --agree-tos -m WarsFAC@gmail.com --force-renewal
           docker compose restart frontend
        }
