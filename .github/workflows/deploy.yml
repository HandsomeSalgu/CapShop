name: CI/CD Deploy Pipeline

# 언제 이 스크립트가 실행될지 정의합니다. (main 브랜치에 코드가 push 되었을 때)
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    # 어디서 실행할지 지정합니다. (GitHub 서버가 아닌, 사용자님의 '데스크톱'에서 실행하라는 뜻)
    runs-on: self-hosted

    steps:
    # 1. 저장소에서 최신 코드를 데스크톱으로 다운로드 받습니다.
    - name: 1. Checkout Repository
      uses: actions/checkout@v4

    # 2. 다운받은 코드 중 backend 폴더로 들어가서 Maven을 이용해 빌드합니다. (jar 파일 생성)
    - name: 2. Build with Maven
      working-directory: ./backend
      # 테스트를 건너뛰고 바로 빌드하는 명령어입니다. (Windows 데스크톱 환경)
      run: ./mvnw.cmd clean package -DskipTests
      
    # 3. 기존에 돌고 있던 동일한 이름의 도커 컨테이너가 있다면 중지하고 삭제합니다.
    - name: 3. Stop and Remove old container (if exists)
      run: |
        docker stop capshop-server || echo "No running container."
        docker rm capshop-server || echo "No container to remove."
      shell: bash

    # 4. 아까 만들어둔 최상위 경로의 Dockerfile을 읽어서 도커 이미지를 생성합니다.
    - name: 4. Build Docker Image
      run: docker build -t capshop-server:latest .

    # 5. 방금 만든 도커 이미지를 컨테이너로 실행합니다. (데스크톱의 8080 포트를 도커 내부의 8080과 연결)
    - name: 5. Run new Docker Container
      run: docker run -d --name capshop-server -p 8080:8080 capshop-server:latest
