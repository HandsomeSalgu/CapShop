name: capshop

services:
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - backend
      - mysql
      - redis

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=syncshopper
      - MYSQL_ROOT_PASSWORD=potato
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  mysql_data:
