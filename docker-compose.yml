name: capshop

services:
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    env_file:
      - ./ai-server/.env
    environment:
      - BACKEND_BASE_URL=http://backend:8080
      - DB_HOST=mysql
      - DB_PORT=3306
    ports:
      - "8000:8000"
    depends_on:
      - backend
      - mysql
      - redis

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/syncshopper?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      - SPRING_DATA_REDIS_HOST=redis
      - APP_AI_FASTAPI_BASE_URL=http://ai-server:8000
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_DATABASE=syncshopper
      - MYSQL_ROOT_PASSWORD=potato
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  mysql_data:
